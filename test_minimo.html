<!DOCTYPE html>
<html>
<head>
    <title>TEST MÍNIMO</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
        button { background: #1DB954; color: #000; padding: 15px 30px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; }
        pre { background: #333; padding: 10px; border-radius: 5px; overflow: auto; }
        .result { margin-top: 20px; padding: 10px; background: #2a2a2a; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔧 TEST MÍNIMO - SOLO LO ESENCIAL</h1>
    
    <button onclick="testMinimo()">🎵 PROBAR CANCIÓN DE PRUEBA</button>
    
    <div class="result" id="result">
        <h3>Resultados:</h3>
        <div id="output"></div>
    </div>
    
    <script>
    async function testMinimo() {
        const output = document.getElementById('output');
        output.innerHTML = '';
        
        function log(msg) {
            output.innerHTML += msg + '<br>';
        }
        
        log('📤 Iniciando prueba...');
        
        // Datos fijos igual que en tu buscador
        const track = {
            uri: 'spotify:track:4cOdK2wGLETKBW3PvgPWqT',
            name: 'Blinding Lights',
            artists: [{ name: 'The Weeknd' }]
        };
        
        const userEmail = localStorage.getItem('userEmail') || 'test@test.com';
        
        log('📧 Email usado: ' + userEmail);
        log('🎵 Canción: ' + track.name + ' - ' + track.artists[0].name);
        log('🔗 URI: ' + track.uri);
        
        const formData = new URLSearchParams();
        formData.append('trackUri', track.uri);
        formData.append('trackName', track.name);
        formData.append('trackArtist', track.artists.map(a => a.name).join(", "));
        formData.append('userEmail', userEmail);
        
        log('📦 Datos enviados: ' + JSON.stringify(Object.fromEntries(formData)));
        
        try {
            log('⏳ Enviando petición...');
            
            const response = await fetch('addToPlaylist.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData.toString(),
                credentials: 'include'
            });
            
            log('📥 Status: ' + response.status + ' ' + response.statusText);
            
            const text = await response.text();
            log('📥 Respuesta RAW (primeros 200 caracteres):');
            log('<pre>' + text.substring(0, 200) + '...</pre>');
            
            try {
                const data = JSON.parse(text);
                log('📥 JSON parseado:');
                log('<pre>' + JSON.stringify(data, null, 2) + '</pre>');
                
                if (data.success) {
                    log('✅ ÉXITO: ' + (data.accion || 'Canción agregada'));
                } else {
                    log('❌ ERROR: ' + (data.message || 'Error desconocido'));
                }
            } catch(e) {
                log('❌ ERROR: No es JSON válido');
                log('❌ Error: ' + e.message);
            }
            
        } catch(err) {
            log('❌ ERROR DE RED: ' + err.message);
        }
    }
    </script>
</body>
</html>
